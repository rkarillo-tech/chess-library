<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useCallback,useMemo,useEffect,useRef}=React;

/* ═══════ CHESS ENGINE ═══════ */
const IB=[["r","n","b","q","k","b","n","r"],["p","p","p","p","p","p","p","p"],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],["P","P","P","P","P","P","P","P"],["R","N","B","Q","K","B","N","R"]];
const PC={K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",P:"♙",k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟"};
const FL=["a","b","c","d","e","f","g","h"],RL=["8","7","6","5","4","3","2","1"];
function cl(b){return b.map(r=>[...r])}function sq(s){return[8-parseInt(s[1]),s.charCodeAt(0)-97]}
function pc(b,fr,fc,tr,tc){const dr=Math.sign(tr-fr),dc=Math.sign(tc-fc);let r=fr+dr,c=fc+dc;while(r!==tr||c!==tc){if(b[r][c])return false;r+=dr;c+=dc}return true}
function cr(b,fr,fc,tr,tc,pt){const dr=tr-fr,dc=tc-fc;switch(pt.toLowerCase()){case"n":return(Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);case"b":return Math.abs(dr)===Math.abs(dc)&&dr!==0&&pc(b,fr,fc,tr,tc);case"r":return(dr===0||dc===0)&&(dr!==0||dc!==0)&&pc(b,fr,fc,tr,tc);case"q":return((dr===0||dc===0)||(Math.abs(dr)===Math.abs(dc)))&&(dr!==0||dc!==0)&&pc(b,fr,fc,tr,tc);case"k":return Math.abs(dr)<=1&&Math.abs(dc)<=1&&(dr!==0||dc!==0);default:return false}}
function pSAN(board,san,isW,lF,lT){let s=san.replace(/[+#!?]/g,"");if(s==="O-O"||s==="0-0"){const r=isW?7:0;return{from:[r,4],to:[r,6],rookFrom:[r,7],rookTo:[r,5]}}if(s==="O-O-O"||s==="0-0-0"){const r=isW?7:0;return{from:[r,4],to:[r,2],rookFrom:[r,0],rookTo:[r,3]}}let pm=null;if(s.includes("=")){const p=s.split("=");pm=p[1][0];s=p[0]}const ic=s.includes("x");s=s.replace("x","");let piece,dest,dis="";if(s[0]>="A"&&s[0]<="Z"){piece=s[0];dest=s.slice(-2);dis=s.slice(1,-2)}else{piece="P";dest=s.slice(-2);dis=s.slice(0,-2)}const[tR,tC]=sq(dest);let dF=-1,dR2=-1;for(const ch of dis){if(ch>="a"&&ch<="h")dF=ch.charCodeAt(0)-97;if(ch>="1"&&ch<="8")dR2=8-parseInt(ch)}const sP=isW?piece.toUpperCase():piece.toLowerCase();if(piece==="P"){const dir=isW?-1:1,sr=isW?6:1;if(ic||dF>=0){const fC=dF>=0?dF:-1,fR=tR-dir;if(fC>=0&&fR>=0&&fR<8&&board[fR][fC]===sP){const res={from:[fR,fC],to:[tR,tC]};if(!board[tR][tC]&&lT)res.epCapture=[lT[0],tC];if(pm)res.promotion=isW?pm.toUpperCase():pm.toLowerCase();return res}}else{if(tR-dir>=0&&tR-dir<8&&board[tR-dir][tC]===sP){const res={from:[tR-dir,tC],to:[tR,tC]};if(pm)res.promotion=isW?pm.toUpperCase():pm.toLowerCase();return res}if(tR-2*dir===sr&&board[sr][tC]===sP&&!board[tR-dir][tC])return{from:[sr,tC],to:[tR,tC]}}}else{for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(board[r][c]!==sP)continue;if(dF>=0&&c!==dF)continue;if(dR2>=0&&r!==dR2)continue;if(cr(board,r,c,tR,tC,piece))return{from:[r,c],to:[tR,tC]}}}return null}
function aM(board,move){const b=cl(board),p=b[move.from[0]][move.from[1]];b[move.from[0]][move.from[1]]=null;b[move.to[0]][move.to[1]]=move.promotion||p;if(move.rookFrom){const rk=b[move.rookFrom[0]][move.rookFrom[1]];b[move.rookFrom[0]][move.rookFrom[1]]=null;b[move.rookTo[0]][move.rookTo[1]]=rk}if(move.epCapture)b[move.epCapture[0]][move.epCapture[1]]=null;return b}
function pPGN(pgn){let c=pgn.replace(/\{[^}]*\}/g,"").replace(/\([^)]*\)/g,"").replace(/\[.*?\]/g,"");c=c.replace(/\d+\.\.\./g,"").replace(/\d+\./g," ").replace(/\s+(1-0|0-1|1\/2-1\/2|\*)\s*$/,"");return c.trim().split(/\s+/).filter(t=>t.length>0&&!["1-0","0-1","1/2-1/2","*"].includes(t))}
function bBS(pgn){const sans=pPGN(pgn),states=[IB.map(r=>[...r])],moves=[];let cur=IB.map(r=>[...r]),lF=null,lT=null;for(let i=0;i<sans.length;i++){const isW=i%2===0,parsed=pSAN(cur,sans[i],isW,lF,lT);if(!parsed){console.warn("Parse fail:",sans[i],i);break}cur=aM(cur,parsed);states.push(cur);moves.push({...parsed,san:sans[i]});lF=parsed.from;lT=parsed.to}return{states,moves}}

/* ═══════ STORAGE ═══════ */
const STORAGE_KEY = "chess_analyzer_library";
const GITHUB_KEY = "chess_analyzer_github";

function getLibrary() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveLibrary(lib) { localStorage.setItem(STORAGE_KEY, JSON.stringify(lib)); }
function addToLibrary(game, source="local") {
  const lib = getLibrary();
  const id = game.info.white.toLowerCase().replace(/\s+/g,"-") + "-vs-" + game.info.black.toLowerCase().replace(/\s+/g,"-") + "-" + (game.info.date||"").replace(/\D+/g,"-").replace(/-+$/,"");
  const exists = lib.findIndex(g => g.id === id);
  const entry = { id, source, data: game };
  if (exists >= 0) lib[exists] = entry; else lib.push(entry);
  saveLibrary(lib);
  return lib;
}
function removeFromLibrary(id) {
  const lib = getLibrary().filter(g => g.id !== id);
  saveLibrary(lib);
  return lib;
}
function getGitHubConfig() {
  try { return JSON.parse(localStorage.getItem(GITHUB_KEY) || "null"); } catch { return null; }
}

",pros:"Abre diagonal, amenaza mortal.",cons:"Dos torres menos, pero ataque compensa."},{san:"Qxa1+",title:"19... Qxa1+ — ¡La segunda torre cae!",explanation:"Captura segunda torre con jaque. Pero piezas negras completamente descoordinadas.",pros:"Captura segunda torre.",cons:"Dama atrapada en a1."},{san:"Ke2",title:"20. Ke2! — El rey se aparta con calma",explanation:"Rey a e2 con absoluta tranquilidad. Las piezas restantes bastan para el mate.",pros:"Sale del jaque.",cons:"Rey expuesto, pero ataque más rápido."},{san:"Na6",title:"20... Na6 — Desarrollo tardío",explanation:"Caballo a a6. Demasiado tarde y lejos.",pros:"Desarrollo.",cons:"Demasiado lento."},{san:"Nxg7+",title:"21. Nxg7+! — ¡El caballo arrasa!",explanation:"Captura g7 con jaque. Demolición de la última barrera de peones.",pros:"Jaque, destruye estructura.",cons:"Ninguna."},{san:"Kd8",title:"21... Kd8 — El rey huye",explanation:"Rey a d8, única casilla. No puede ir a f8 por Bd6, ni a d7 por Nd5.",pros:"Evita amenazas en e8.",cons:"Rey expuesto."},{san:"Qf6+",title:"22. Qf6+!! — ¡¡¡SACRIFICIO DE DAMA!!!",explanation:"¡¡¡LA JUGADA MÁS FAMOSA!!! SACRIFICA LA DAMA. Tras ambas torres, ahora la dama. Va a dar mate solo con piezas menores. ¡Pura poesía!",pros:"Fuerza captura, mate imparable.",cons:"Se pierde la dama... ¡pero es mate en una!"},{san:"Nxf6",title:"22... Nxf6 — Captura obligada",explanation:"Captura forzada. Negro tiene ventaja material aplastante. Pero es irrelevante.",pros:"Gana la dama.",cons:"Abre e7 para el alfil: ¡MATE!"},{san:"Be7#",title:"23. Be7# — ¡¡¡JAQUE MATE!!! ✦",explanation:"¡¡¡MATE!!! Alfil a e7. Rey en d8 no escapa: Nd5 cubre c7, Ng7 cubre e8. Mate con piezas menores tras sacrificar AMBAS TORRES y la DAMA.",pros:"JAQUE MATE. La victoria más bella de la historia.",cons:"Ninguno. Es perfecta."}]};

/* ═══════ MATERIAL BALANCE ═══════ */
function MatBal({board}){
  const init={P:8,R:2,N:2,B:2,Q:1,K:1,p:8,r:2,n:2,b:2,q:1,k:1},cur={};
  for(const row of board)for(const p of row)if(p)cur[p]=(cur[p]||0)+1;
  const wL=[],bL=[];
  for(const p of["Q","R","B","N","P"]){const n=(init[p]||0)-(cur[p]||0);for(let i=0;i<n;i++)wL.push(PC[p])}
  for(const p of["q","r","b","n","p"]){const n=(init[p]||0)-(cur[p]||0);for(let i=0;i<n;i++)bL.push(PC[p])}
  return(<div><div className="mr"><span className="mlb">♚ Capturado:</span><span className="mpc w">{bL.length>0?bL.join(" "):"—"}</span></div><div className="mr"><span className="mlb">♔ Capturado:</span><span className="mpc bk">{wL.length>0?wL.join(" "):"—"}</span></div></div>);
}

/* ═══════ MAIN APP ═══════ */
function App(){
  const[screen,setScreen]=useState("home");
  const[gameData,setGameData]=useState(null);
  const[boardData,setBoardData]=useState(null);
  const[step,setStep]=useState(0);
  const[autoPlay,setAutoPlay]=useState(false);
  const[error,setError]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[library,setLibrary]=useState(getLibrary());
  const[ghUrl,setGhUrl]=useState(getGitHubConfig()||"");
  const[ghStatus,setGhStatus]=useState(null);
  const[ghLoading,setGhLoading]=useState(false);
  const fileRef=useRef();

  function loadGame(data,save=false,source="local"){
    try{
      const{states,moves}=bBS(data.pgn);
      if(moves.length===0)throw new Error("No se pudieron parsear las jugadas.");
      setGameData(data);setBoardData({states,moves});
      setStep(0);setAutoPlay(false);setError(null);setScreen("viewer");
      if(save){const lib=addToLibrary(data,source);setLibrary(lib);}
    }catch(e){setError("Error: "+e.message)}
  }

  function handleFile(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const json=JSON.parse(e.target.result);
        if(!json.pgn||!json.analysis||!json.info){setError("JSON sin formato correcto.");return}
        loadGame(json,true,"local");
      }catch(err){setError("Error JSON: "+err.message)}
    };reader.readAsText(file);
  }
  function handleDrop(e){e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0])}
  function deleteGame(id){
    if(!confirm("¿Eliminar esta partida de la biblioteca?"))return;
    const lib=removeFromLibrary(id);setLibrary(lib);
  }

  async function syncGitHub(){
    const url=ghUrl.trim();
    if(!url)return;
    saveGitHubConfig(url);
    setGhLoading(true);setGhStatus(null);
    try{
      let base=url.replace(/\/+$/,"");
      // Convert github.com URL to raw content URL
      const ghMatch=base.match(/github\.com\/([^/]+)\/([^/]+)/);
      let rawBase;
      if(ghMatch){
        const[,user,repo]=ghMatch;
        // Try GitHub Pages first, then raw
        rawBase=`https://${user}.github.io/${repo}/partidas`;
      }else{
        rawBase=base+"/partidas";
      }
      const indexRes=await fetch(rawBase+"/index.json");
      if(!indexRes.ok)throw new Error("No se encontró partidas/index.json");
      const index=await indexRes.json();
      if(!Array.isArray(index.games))throw new Error("index.json debe tener un array 'games'");
      let loaded=0;
      for(const filename of index.games){
        try{
          const res=await fetch(rawBase+"/"+filename);
          if(!res.ok)continue;
          const game=await res.json();
          if(game.pgn&&game.analysis&&game.info){addToLibrary(game,"github");loaded++}
        }catch(e){console.warn("Error cargando",filename,e)}
      }
      setLibrary(getLibrary());
      setGhStatus({ok:true,msg:`Sincronizado: ${loaded} partida${loaded!==1?"s":""} cargada${loaded!==1?"s":""}`});
    }catch(e){
      setGhStatus({ok:false,msg:e.message});
    }finally{setGhLoading(false)}
  }

  useEffect(()=>{
    if(!autoPlay||!boardData)return;
    if(step>=boardData.moves.length){setAutoPlay(false);return}
    const t=setTimeout(()=>setStep(s=>s+1),2800);
    return()=>clearTimeout(t);
  },[autoPlay,step,boardData]);

  const goTo=useCallback((s)=>{setStep(s);setAutoPlay(false)},[]);

  useEffect(()=>{
    if(screen!=="viewer"||!boardData)return;
    function hk(e){
      if(e.key==="ArrowRight")goTo(Math.min(boardData.moves.length,step+1));
      else if(e.key==="ArrowLeft")goTo(Math.max(0,step-1));
      else if(e.key==="Home")goTo(0);
      else if(e.key==="End")goTo(boardData.moves.length);
    }
    window.addEventListener("keydown",hk);return()=>window.removeEventListener("keydown",hk);
  },[screen,boardData,step,goTo]);

  // Auto-sync GitHub on load
  useEffect(()=>{
    const cfg=getGitHubConfig();
    if(cfg){setGhUrl(cfg);/* auto sync on first load disabled to avoid delays */}
  },[]);

  /* ── HOME ── */
  if(screen==="home"){
    return(
      <div className="home">
        <div className="home-inner">
          <div className="home-icon">♔</div>
          <h1 className="home-title">Chess Analyzer</h1>
          <p className="home-sub">Análisis didáctico de partidas de ajedrez, jugada a jugada</p>

          {/* Built-in */}
          <div className="section-label">Partida incluida</div>
          <button className="game-card" onClick={()=>loadGame(IMMORTAL)}>
            <div className="game-card-inner">
              <span className="game-card-icon">♚</span>
              <div>
                <div className="game-card-title">La Partida Inmortal</div>
                <div className="game-card-sub">Anderssen vs Kieseritzky — Londres, 1851</div>
                <div className="game-card-detail">23 jugadas · Gambito de Rey · Sacrificio de dama y ambas torres</div>
              </div>
            </div>
            <span className="game-card-badge badge-builtin">INCLUIDA</span>
          </button>

          {/* Library */}
          {library.length>0 && (
            <div style={{marginTop:20}}>
              <div className="section-label">Tu biblioteca ({library.length} partida{library.length!==1?"s":""})</div>
              {library.map(g=>(
                <button key={g.id} className="game-card" onClick={()=>loadGame(g.data)}>
                  <div className="game-card-inner">
                    <span className="game-card-icon">{g.data.info.result==="1-0"?"♔":g.data.info.result==="0-1"?"♚":"½"}</span>
                    <div>
                      <div className="game-card-title">{g.data.info.title}</div>
                      <div className="game-card-sub">{g.data.info.white} vs {g.data.info.black} — {g.data.info.date}</div>
                      <div className="game-card-detail">{g.data.info.result} · {g.data.info.event}</div>
                    </div>
                  </div>
                  <span className={`game-card-badge ${g.source==="github"?"badge-github":"badge-local"}`}>
                    {g.source==="github"?"GITHUB":"LOCAL"}
                  </span>
                  <button className="delete-btn" onClick={(e)=>{e.stopPropagation();deleteGame(g.id)}}>Eliminar</button>
                </button>
              ))}
            </div>
          )}

          {/* Upload */}
          <div className="separator"><div className="separator-line"/><span>Cargar nueva partida</span><div className="separator-line"/></div>
          <div className={`drop-zone ${dragOver?"active":""}`} onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop} onClick={()=>fileRef.current?.click()}>
            <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
            <div className="drop-zone-icon">📂</div>
            <div className="drop-zone-text">Arrastra un <strong>.json</strong> aquí o haz clic para seleccionar</div>
            <div className="drop-zone-hint">Se guardará automáticamente en tu biblioteca</div>
          </div>

          {error&&<div className="error-msg">{error}</div>}

          {/* GitHub sync */}
          <div className="github-section">
            <div className="section-label" style={{marginBottom:4}}>Sincronizar con GitHub</div>
            <div style={{fontSize:12,color:"#8a7a62",marginBottom:8}}>
              Conecta un repositorio para compartir partidas entre dispositivos.
            </div>
            <div className="github-row">
              <input className="github-input" placeholder="https://github.com/tu-usuario/chess-library" value={ghUrl} onChange={e=>setGhUrl(e.target.value)}/>
              <button className="github-btn" onClick={syncGitHub} disabled={ghLoading||!ghUrl.trim()}>
                {ghLoading?"Cargando...":"Sincronizar"}
              </button>
            </div>
            {ghStatus&&(
              <div className={`github-status ${ghStatus.ok?"status-ok":"status-err"}`}>{ghStatus.msg}</div>
            )}
            <div className="github-hint">
              <strong style={{color:"#a08c70"}}>Estructura del repo:</strong> Crea una carpeta <span className="code-inline">partidas/</span> con tus archivos .json y un <span className="code-inline">partidas/index.json</span> con el formato:<br/>
              <code style={{color:"#d4a745",fontSize:11}}>{'{"games":["kasparov-vs-topalov-1999.json","morphy-vs-duke-1858.json"]}'}</code>
            </div>
          </div>

          {/* Instructions */}
          <div className="instructions">
            <div className="instructions-title">Cómo generar un análisis</div>
            <div className="instructions-body">
              <span className="step-num">1.</span> Abre <strong>prompt-analisis-ajedrez.md</strong><br/>
              <span className="step-num">2.</span> Copia el prompt → pégalo en Claude / ChatGPT / Gemini<br/>
              <span className="step-num">3.</span> Sustituye <span className="code-inline">[PEGAR PGN AQUÍ]</span> por tu PGN<br/>
              <span className="step-num">4.</span> Descarga el .json que genera el LLM<br/>
              <span className="step-num">5.</span> Cárgalo aquí o súbelo a tu repo de GitHub<br/>
              <span className="step-num">⌨</span> En el visor usa las flechas <strong>← →</strong> del teclado
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── VIEWER ── */
  const{states,moves}=boardData;
  const board=states[step];
  const analysis=(gameData.analysis&&gameData.analysis[step-1])||null;
  const move=step>0?moves[step-1]:null;
  const isWT=step%2===1;
  const total=moves.length;

  return(
    <div className="viewer">
      <div className="viewer-header">
        <button className="back-btn" onClick={()=>{setScreen("home");setGameData(null);setBoardData(null);setStep(0)}}>← Volver</button>
        <h1 className="viewer-title">♔ {gameData.info.title}</h1>
        <p className="viewer-sub">{gameData.info.white} vs {gameData.info.black} — {gameData.info.event}, {gameData.info.date}</p>
      </div>
      <div className="main-layout">
        <div className="board-side">
          <div className="board-frame">
            <div className="board-labels">{FL.map(f=><div key={f} className="board-label">{f}</div>)}</div>
            {board.map((row,r)=>(
              <div key={r} className="board-row">
                <div className="rank-label">{RL[r]}</div>
                {row.map((piece,c)=>{
                  const il=(r+c)%2===0,iF=move&&move.from[0]===r&&move.from[1]===c,iT=move&&move.to[0]===r&&move.to[1]===c;
                  let cs="cell";
                  if(iF)cs+=il?" fl":" fd";else if(iT)cs+=il?" tl":" td";else cs+=il?" l":" d";
                  if(piece)cs+=piece===piece.toUpperCase()?" wp":" bp";
                  return(<div key={c} className={cs}>{piece&&PC[piece]}{iT&&<div className="dot"/>}</div>);
                })}
                <div className="rank-label">{RL[r]}</div>
              </div>
            ))}
            <div className="board-labels">{FL.map(f=><div key={f} className="board-label">{f}</div>)}</div>
          </div>
          <div className="controls">
            {[{l:"⏮",a:()=>goTo(0),d:step===0},{l:"◀",a:()=>goTo(Math.max(0,step-1)),d:step===0},{l:autoPlay?"⏸":"▶ Auto",a:()=>setAutoPlay(a=>!a),d:step>=total&&!autoPlay},{l:"▶",a:()=>goTo(Math.min(total,step+1)),d:step>=total},{l:"⏭",a:()=>goTo(total),d:step>=total}].map((b,i)=>
              <button key={i} className="cb" onClick={b.a} disabled={b.d}>{b.l}</button>
            )}
          </div>
          <div className="mc">Jugada {step} de {total}{step>0&&<span className={`tb ${isWT?"w":"b"}`}>{isWT?"♔ Blancas":"♚ Negras"}</span>}</div>
        </div>

        <div className="rp">
          <div className="ml">
            <div className="pl">Lista de jugadas</div>
            <div className="mbs">
              {moves.map((m,i)=>{
                const mn=Math.floor(i/2)+1;
                const label=i%2===0?`${mn}.${m.san}`:`${mn}...${m.san}`;
                return<button key={i} className={`mc2 ${step===i+1?"a":""}`} onClick={()=>goTo(i+1)}>{label}</button>;
              })}
            </div>
          </div>
          <div className="ap">
            {step===0?(
              <div>
                <div className="at">{gameData.info.title}</div>
                <p className="it">{gameData.info.description}</p>
                <p className="ih">Pulsa ▶ o haz clic en cualquier jugada. Flechas ← → del teclado.</p>
              </div>
            ):analysis?(
              <div>
                <div className="at">{analysis.title}</div>
                <p className="ax">{analysis.explanation}</p>
                <div className="pc">
                  <div className="tr"><span className="tg p">PROS</span><span className="tt p">{analysis.pros}</span></div>
                  <div className="tr"><span className="tg c">CONT</span><span className="tt c">{analysis.cons}</span></div>
                </div>
                {step===total&&(
                  <div className="rb"><div className="ri">♔ {gameData.info.result} ♚</div><div className="rt">¡Fin de la partida!</div></div>
                )}
              </div>
            ):(
              <div className="na">No hay análisis para esta jugada.</div>
            )}
          </div>
          <div className="mp"><div className="pl">Material capturado</div><MatBal board={board}/></div>
          <div className="ib"><strong>Resultado:</strong> {gameData.info.result} · <strong>Jugadas:</strong> {Math.ceil(total/2)} · <strong>Evento:</strong> {gameData.info.event}</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
